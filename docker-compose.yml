services:
  postgres:
    image: postgres:18
    container_name: loxql-postgres
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - loxql-postgres-data:/var/lib/postgresql
    networks:
      - lox-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  lox-network:
volumes:
  loxql-postgres-data:
